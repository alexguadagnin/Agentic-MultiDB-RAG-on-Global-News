version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # 1. POSTGRESQL (Dati Strutturati GDELT)
  # ---------------------------------------------------------------------------
  postgres-gdelt:
    image: postgres:16-alpine
    container_name: gdelt_postgres_db
    environment:
      POSTGRES_USER: gdelt_admin
      POSTGRES_PASSWORD: strong_password_123
      POSTGRES_DB: gdelt_rag_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gdelt_admin -d gdelt_rag_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag_network

  # ---------------------------------------------------------------------------
  # 2. QDRANT (Database Vettoriale)
  # ---------------------------------------------------------------------------
  qdrant-db:
    image: qdrant/qdrant:latest
    container_name: gdelt_qdrant_db
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      # MODIFICA QUI: Usiamo WGET invece di CURL
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag_network

  # ---------------------------------------------------------------------------
  # 3. ELASTICSEARCH (Ricerca Full-Text / BM25)
  # ---------------------------------------------------------------------------
  elasticsearch-db:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: gdelt_elastic_db
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m" # Limitato a 512MB per stabilità in dev
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=1s || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - rag_network

  # ---------------------------------------------------------------------------
  # 4. NEO4J (Knowledge Graph)
  # ---------------------------------------------------------------------------
  neo4j-db:
    image: neo4j:5.16
    container_name: gdelt_neo4j_db
    ports:
      - "7474:7474" # Browser UI
      - "7687:7687" # Bolt Protocol
    volumes:
      - neo4j_data:/data
      - ./data:/import
    environment:
      - NEO4J_AUTH=neo4j/strong_password_neo4j
      - NEO4J_PLUGINS=["apoc"]
      
      # --- MEMORY SETTINGS (SAFE MODE) ---
      # Impostazioni conservative per evitare crash del sistema durante lo sviluppo.
      # Sostituiscono quelle da 8GB/12GB che avevi prima.
      # Se hai una workstation con 64GB RAM, puoi ripristinare i valori alti.
      - NEO4J_server_memory_heap_initial__size=1G
      - NEO4J_server_memory_heap_max__size=2G
      - NEO4J_server_memory_pagecache_size=1G
      
      # Security settings per APOC e Import
      - NEO4J_dbms_security_allow__csv__import__from__file__urls=true
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    stop_grace_period: 2m
    networks:
      - rag_network

  # ---------------------------------------------------------------------------
  # 5. BACKEND RAG (FastAPI + LangGraph) - NUOVO SERVIZIO
  # ---------------------------------------------------------------------------
  backend-rag:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gdelt_backend
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./src:/app/src     # Hot-reload del codice
      - ./data:/app/data   # Accesso ai file locali
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app/src
      
      # Connessione ai DB usando i "service names" di Docker come host
      - POSTGRES_HOST=postgres-gdelt
      - POSTGRES_PORT=5432
      - POSTGRES_USER=gdelt_admin
      - POSTGRES_PASSWORD=strong_password_123
      - POSTGRES_DB=gdelt_rag_db
      
      - QDRANT_HOST=qdrant-db
      - QDRANT_PORT=6333
      
      - ELASTIC_HOST=elasticsearch-db
      - ELASTIC_PORT=9200
      
      - NEO4J_HOST=neo4j-db
      - NEO4J_URI=bolt://neo4j-db:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=strong_password_neo4j
      
      # API Keys (lette dal file .env nella root se esiste, altrimenti dal sistema)
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    command: uvicorn Hybrid_RAG.api.main:app --host 0.0.0.0 --port 8000 --reload
    #command: tail -f /dev/null
    depends_on:
      postgres-gdelt:
        condition: service_healthy
      elasticsearch-db:
        condition: service_healthy
      neo4j-db:
        condition: service_healthy
      # Qdrant a volte non ha healthcheck nativo affidabile in tutte le versioni, 
      # quindi usiamo service_started per sicurezza o service_healthy se passa il test
      qdrant-db:
        #condition: service_healthy 
        condition: service_started
    networks:
      - rag_network

# ---------------------------------------------------------------------------
  # 6. NEO4J TEST (Usa e Getta per Scalabilità)
  # ---------------------------------------------------------------------------
  neo4j-test-db:
    image: neo4j:5.16
    container_name: gdelt_neo4j_test
    ports:
      - "7475:7474" # Porta HTTP diversa (7475 invece di 7474)
      - "7688:7687" # Porta Bolt diversa (7688 invece di 7687) !!! IMPORTANTE
    volumes:
      # USIAMO UN VOLUME DIVERSO! I tuoi dati originali sono salvi in neo4j_data
      - neo4j_test_data:/data 
      - ./data:/import
    environment:
      - NEO4J_AUTH=neo4j/strong_password_test
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_allow__csv__import__from__file__urls=true
      # Memoria bassa per il test
      - NEO4J_server_memory_heap_initial__size=4G
      - NEO4J_server_memory_heap_max__size=12G
      - NEO4J_server_memory_pagecache_size=4G
      - NEO4J_dbms_memory_transaction_total_max=0 # 0 significa illimitato (usa tutta la heap disponibile)
    networks:
      - rag_network

# ---------------------------------------------------------------------------
# VOLUMI E RETI
# ---------------------------------------------------------------------------
volumes:
  pgdata:          # Mantiene i dati Postgres esistenti
  qdrant_storage:  # Mantiene i dati Qdrant esistenti
  esdata:          # Mantiene i dati Elastic esistenti
  neo4j_data:      # Mantiene i dati Neo4j esistenti
  neo4j_test_data: # Test

networks:
  rag_network:
    driver: bridge